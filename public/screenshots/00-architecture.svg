<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1000" viewBox="0 0 1500 1000" role="img" aria-labelledby="title desc">
  <title id="title">Encore architecture</title>
  <desc id="desc">Data flows from a lyric-free Song Map and practice logs through validated Next.js routes, GPT-5.6 or deterministic fixtures, explainable readiness, an artist decision, and an external publish milestone.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f8f5e8"/><stop offset="1" stop-color="#e8f5d8"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#15362c" flood-opacity="0.12"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#577168"/></marker>
    <style>
      .eyebrow{font:700 22px ui-sans-serif,system-ui,sans-serif;letter-spacing:3px;fill:#4e675e}.title{font:800 56px ui-sans-serif,system-ui,sans-serif;fill:#11382c}.subtitle{font:400 25px ui-sans-serif,system-ui,sans-serif;fill:#476057}.layer{font:700 20px ui-sans-serif,system-ui,sans-serif;letter-spacing:1px;fill:#315349}.node-title{font:750 22px ui-sans-serif,system-ui,sans-serif;fill:#153b30}.node-copy{font:400 17px ui-sans-serif,system-ui,sans-serif;fill:#52675f}.small{font:650 15px ui-sans-serif,system-ui,sans-serif;fill:#315349}.line{fill:none;stroke:#577168;stroke-width:3;marker-end:url(#arrow)}.card{fill:#fff;stroke:#cfddd3;stroke-width:2;filter:url(#shadow)}.server{fill:#ecf8e4;stroke:#9bbc83}.decision{fill:#d9f64a;stroke:#7c9824;stroke-width:2}.output{fill:#153b30;stroke:#153b30}.output-title{font:750 22px ui-sans-serif,system-ui,sans-serif;fill:#f8f5e8}.output-copy{font:400 17px ui-sans-serif,system-ui,sans-serif;fill:#d7e5df}
    </style>
  </defs>
  <rect width="1500" height="1000" fill="url(#background)"/><circle cx="1390" cy="95" r="140" fill="#d9f64a" opacity=".28"/><circle cx="80" cy="930" r="180" fill="#c4e7b4" opacity=".35"/>
  <text x="80" y="80" class="eyebrow">ENCORE · SYSTEM FLOW</text><text x="80" y="145" class="title">From Song Map to publish decision</text><text x="80" y="190" class="subtitle">Validated model boundaries. Explainable readiness. The artist stays in control.</text>
  <text x="80" y="255" class="layer">① BROWSER INPUTS</text><text x="420" y="255" class="layer">② SAFE SERVER BOUNDARY</text><text x="965" y="255" class="layer">③ DECISION + OUTPUT</text>
  <rect x="80" y="285" width="270" height="130" rx="22" class="card"/><text x="110" y="330" class="node-title">♪ Lyric-free Song Map</text><text x="110" y="365" class="node-copy">sections · structural notes</text><text x="110" y="392" class="node-copy">target date · frequency</text>
  <rect x="80" y="465" width="270" height="130" rx="22" class="card"/><text x="110" y="510" class="node-title">✓ Practice log</text><text x="110" y="545" class="node-copy">section · session</text><text x="110" y="572" class="node-copy">confidence 1–5 · note</text>
  <rect x="420" y="285" width="200" height="130" rx="22" class="card server"/><text x="450" y="330" class="node-title">Zod validation</text><text x="450" y="365" class="node-copy">unknown JSON</text><text x="450" y="392" class="node-copy">relationship checks</text>
  <polygon points="745,285 855,350 745,415 635,350" class="decision" filter="url(#shadow)"/><text x="690" y="343" class="node-title">Lyric</text><text x="681" y="371" class="node-title">Firewall?</text>
  <polygon points="745,465 855,530 745,595 635,530" class="decision" filter="url(#shadow)"/><text x="687" y="523" class="node-title">API key</text><text x="671" y="551" class="node-title">configured?</text>
  <rect x="420" y="645" width="230" height="130" rx="22" class="card server"/><text x="450" y="690" class="node-title">GPT‑5.6</text><text x="450" y="725" class="node-copy">Responses API</text><text x="450" y="752" class="node-copy">structured output</text>
  <rect x="700" y="645" width="230" height="130" rx="22" class="card"/><text x="730" y="690" class="node-title">Demo fixture</text><text x="730" y="725" class="node-copy">deterministic · labeled</text><text x="730" y="752" class="node-copy">same response schema</text>
  <rect x="965" y="285" width="225" height="130" rx="22" class="card"/><text x="995" y="330" class="node-title">Countdown plan</text><text x="995" y="365" class="node-copy">dated sessions</text><text x="995" y="392" class="node-copy">stored locally</text>
  <rect x="965" y="465" width="225" height="130" rx="22" class="card"/><text x="995" y="510" class="node-title">Mastery trends</text><text x="995" y="545" class="node-copy">coverage · confidence</text><text x="995" y="572" class="node-copy">declining penalties</text>
  <polygon points="1280,465 1390,530 1280,595 1170,530" class="decision" filter="url(#shadow)"/><text x="1217" y="523" class="node-title">Artist</text><text x="1200" y="551" class="node-title">records?</text>
  <rect x="965" y="645" width="225" height="130" rx="22" class="output" filter="url(#shadow)"/><text x="995" y="690" class="output-title">Making Of caption</text><text x="995" y="725" class="output-copy">validated + lyric-checked</text><text x="995" y="752" class="output-copy">copy for external post</text>
  <rect x="1230" y="645" width="190" height="130" rx="22" class="output" filter="url(#shadow)"/><text x="1260" y="690" class="output-title">Publish</text><text x="1260" y="725" class="output-copy">artist posts</text><text x="1260" y="752" class="output-copy">milestone saved</text>
  <path d="M350 350H420" class="line"/><path d="M620 350H635" class="line"/><path d="M745 415V465" class="line"/><path d="M690 575L585 645" class="line"/><path d="M800 575L815 645" class="line"/><path d="M650 710H950Q965 710 965 695V415" class="line"/><path d="M930 710H950Q965 710 965 695V415" class="line"/><path d="M1078 415V465" class="line"/><path d="M350 530H380V610H1078V595" class="line"/><path d="M1190 530H1170" class="line"/><path d="M1280 595V625Q1280 645 1260 645H1190" class="line"/><path d="M1190 710H1230" class="line"/>
  <text x="650" y="336" class="small">PASS</text><text x="597" y="624" class="small">YES</text><text x="832" y="624" class="small">NO</text><text x="1235" y="620" class="small">RECORDED</text><text x="404" y="601" class="small">LOGS FEED DETERMINISTIC TRENDS</text>
  <rect x="80" y="840" width="1340" height="95" rx="22" fill="#fff" stroke="#cfddd3" stroke-width="2"/><text x="110" y="881" class="node-title">Trust boundaries</text><text x="110" y="914" class="node-copy">Model input and output are validated twice · readiness is deterministic · data stays in versioned localStorage · publishing happens outside Encore</text>
</svg>
